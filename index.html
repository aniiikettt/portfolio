<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aniket Kumar — Data Analyst Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --indigo: #6366f1;
  --indigo-light: #818cf8;
  --indigo-dark: #4338ca;
  --pink: #ec4899;
  --pink-light: #f472b6;
  --cyan: #06b6d4;
  --cyan-light: #22d3ee;
  --amber: #f59e0b;
  --amber-light: #fbbf24;
  --bg: #080818;
  --bg2: #0d0d2b;
  --bg3: #111132;
  --surface: rgba(255,255,255,0.04);
  --surface2: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.08);
  --text: #e2e8f0;
  --text-muted: #94a3b8;
  --text-dim: #475569;
  --radius: 16px;
  --radius-sm: 10px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  cursor: none;
}

/* ========== CUSTOM CURSOR ========== */
#cursor {
  position: fixed;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--cyan);
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: background 0.2s, transform 0.1s;
  mix-blend-mode: screen;
  box-shadow: 0 0 12px var(--cyan), 0 0 24px var(--cyan);
}
#cursor-ring {
  position: fixed;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1.5px solid rgba(99, 102, 241, 0.6);
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%, -50%);
  transition: width 0.3s, height 0.3s, border-color 0.3s;
}
body:hover #cursor-ring { border-color: var(--indigo-light); }
a:hover ~ #cursor, button:hover ~ #cursor { transform: translate(-50%,-50%) scale(2); }

/* ========== LOADING SCREEN ========== */
#loader {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 10000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  transition: opacity 0.7s ease, visibility 0.7s ease;
}
#loader.hidden { opacity: 0; visibility: hidden; }
.loader-initials {
  font-family: 'Syne', sans-serif;
  font-size: 72px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--indigo-light), var(--pink), var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -2px;
  animation: pulse-scale 1.2s ease-in-out infinite;
}
